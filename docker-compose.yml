# Full stack: the analyzer (API + dashboard) and a local Ollama.
# Models are pulled automatically on first start.
#
#   docker compose up -d
#
# Dashboard: http://localhost:5000

services:
  analyzer:
    build: .
    ports:
      - "5000:5000"
    environment:
      OLLAMA_URL: http://ollama:11434
      TOPIC_BANK_PATH: /app/bankdata/topic_bank.json
    volumes:
      - analyses:/app/analyses
      - embedding-cache:/app/.embedding_cache
      - llm-cache:/app/.llm_cache
      - jobs:/app/jobs
      - topic-bank:/app/bankdata
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

  # One-shot: downloads the models into the shared volume on first start
  model-init:
    image: ollama/ollama
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c",
                 "sleep 3 && ollama pull nomic-embed-text && ollama pull llama3.2"]
    restart: "no"

volumes:
  analyses:
  embedding-cache:
  llm-cache:
  jobs:
  topic-bank:
  ollama-models:
