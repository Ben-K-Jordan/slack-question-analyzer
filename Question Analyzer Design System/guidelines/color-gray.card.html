<!-- @dsCard group="Colors" viewport="700x130" name="Gray — neutrals" subtitle="The UI workhorse: surfaces, borders, text" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.ramp{display:flex;border:1px solid var(--border-subtle)}
.sw{flex:1;height:72px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px}
.n{font-size:10px;font-family:var(--font-mono)}
.hex{font-size:9px;font-family:var(--font-mono);opacity:.7}</style></head>
<body>
<div class="ramp">
  <div class="sw" style="background:var(--gray-10);color:#161616"><span class="n">10</span><span class="hex">f4f4f4</span></div>
  <div class="sw" style="background:var(--gray-20);color:#161616"><span class="n">20</span><span class="hex">e0e0e0</span></div>
  <div class="sw" style="background:var(--gray-30);color:#161616"><span class="n">30</span><span class="hex">c6c6c6</span></div>
  <div class="sw" style="background:var(--gray-50);color:#fff"><span class="n">50</span><span class="hex">8d8d8d</span></div>
  <div class="sw" style="background:var(--gray-60);color:#fff"><span class="n">60</span><span class="hex">6f6f6f</span></div>
  <div class="sw" style="background:var(--gray-70);color:#fff"><span class="n">70</span><span class="hex">525252</span></div>
  <div class="sw" style="background:var(--gray-90);color:#fff"><span class="n">90</span><span class="hex">262626</span></div>
  <div class="sw" style="background:var(--gray-100);color:#fff"><span class="n">100</span><span class="hex">161616</span></div>
</div>
</body></html>
