<!-- @dsCard group="Brand" viewport="700x170" name="Frequency heat ramp" subtitle="Rank 1–3 ride the blue ramp; lower ranks fade to gray" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.rk{font-family:var(--font-mono);font-size:14px;width:28px;text-align:right}
.bar{height:10px}
.ct{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)}</style></head>
<body>
<div class="row"><span class="rk" style="color:var(--blue-60)">01</span><span class="bar" style="width:100%;background:var(--blue-60)"></span><span class="ct">14×</span></div>
<div class="row"><span class="rk" style="color:var(--blue-50)">02</span><span class="bar" style="width:64%;background:var(--blue-50)"></span><span class="ct">9×</span></div>
<div class="row"><span class="rk" style="color:var(--blue-40)">03</span><span class="bar" style="width:43%;background:var(--blue-40)"></span><span class="ct">6×</span></div>
<div class="row"><span class="rk" style="color:var(--gray-40)">04</span><span class="bar" style="width:29%;background:var(--gray-40)"></span><span class="ct">4×</span></div>
<div class="row"><span class="rk" style="color:var(--gray-40)">05</span><span class="bar" style="width:14%;background:var(--gray-40)"></span><span class="ct">2×</span></div>
</body></html>
