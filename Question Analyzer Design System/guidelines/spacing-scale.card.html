<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="Carbon 8px-grid mini-units, 01 → 09" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-mono)}
.row{display:flex;align-items:center;gap:14px;margin-bottom:8px;font-size:11px;color:var(--text-secondary)}
.bar{height:14px;background:var(--blue-60)}
.tok{width:80px;flex:0 0 80px;color:var(--text-primary)}
.px{width:44px;flex:0 0 44px;text-align:right;color:var(--text-helper)}</style></head>
<body>
<div class="row"><span class="tok">spacing-02</span><span class="px">4px</span><span class="bar" style="width:4px"></span></div>
<div class="row"><span class="tok">spacing-03</span><span class="px">8px</span><span class="bar" style="width:8px"></span></div>
<div class="row"><span class="tok">spacing-05</span><span class="px">16px</span><span class="bar" style="width:16px"></span></div>
<div class="row"><span class="tok">spacing-06</span><span class="px">24px</span><span class="bar" style="width:24px"></span></div>
<div class="row"><span class="tok">spacing-07</span><span class="px">32px</span><span class="bar" style="width:32px"></span></div>
<div class="row"><span class="tok">spacing-09</span><span class="px">48px</span><span class="bar" style="width:48px"></span></div>
</body></html>
