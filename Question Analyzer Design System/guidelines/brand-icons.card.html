<!-- @dsCard group="Brand" viewport="700x150" name="Iconography" subtitle="Lucide @ 2px stroke — stand-in for @carbon/icons (see readme)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:24px;background:#fff;font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(8,1fr);gap:18px}
.item{display:flex;flex-direction:column;align-items:center;gap:8px}
.item i{color:var(--text-primary)}
.cap{font-family:var(--font-mono);font-size:9px;color:var(--text-helper)}</style></head>
<body>
<div class="grid" id="g"></div>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
<script>
  const icons = ['search','upload','filter','arrow-up-down','message-square-text','hash','download','sliders-horizontal','chevron-down','x','trending-up','sparkles'];
  document.getElementById('g').innerHTML = icons.map(n => `<div class="item"><i data-lucide="${n}"></i><span class="cap">${n}</span></div>`).join('');
  lucide.createIcons({ attrs: { width: 22, height: 22, 'stroke-width': 2 } });
</script>
</body></html>
