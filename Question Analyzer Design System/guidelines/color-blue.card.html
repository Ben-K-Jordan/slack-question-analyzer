<!-- @dsCard group="Colors" viewport="700x130" name="Blue — interactive" subtitle="IBM Blue ramp · 60 is the primary action color" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.ramp{display:flex;border:1px solid var(--border-subtle)}
.sw{flex:1;height:72px;display:flex;flex-direction:column;justify-content:flex-end;padding:6px}
.n{font-size:10px;font-family:var(--font-mono)}
.hex{font-size:9px;font-family:var(--font-mono);opacity:.7}</style></head>
<body>
<div class="ramp">
  <div class="sw" style="background:var(--blue-10);color:#161616"><span class="n">10</span><span class="hex">edf5ff</span></div>
  <div class="sw" style="background:var(--blue-20);color:#161616"><span class="n">20</span><span class="hex">d0e2ff</span></div>
  <div class="sw" style="background:var(--blue-40);color:#161616"><span class="n">40</span><span class="hex">78a9ff</span></div>
  <div class="sw" style="background:var(--blue-50);color:#fff"><span class="n">50</span><span class="hex">4589ff</span></div>
  <div class="sw" style="background:var(--blue-60);color:#fff;outline:2px solid var(--gray-100);outline-offset:-2px"><span class="n">60 ★</span><span class="hex">0f62fe</span></div>
  <div class="sw" style="background:var(--blue-70);color:#fff"><span class="n">70</span><span class="hex">0043ce</span></div>
  <div class="sw" style="background:var(--blue-80);color:#fff"><span class="n">80</span><span class="hex">002d9c</span></div>
  <div class="sw" style="background:var(--blue-100);color:#fff"><span class="n">100</span><span class="hex">001141</span></div>
</div>
</body></html>
