<!-- @dsCard group="Colors" viewport="700x150" name="Support & accents" subtitle="Status colors and the data-viz accent set" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:#fff;font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.chip{height:48px;border:1px solid rgba(0,0,0,.08);display:flex;align-items:flex-end;padding:6px;color:#fff}
.lab{font-size:11px;margin-top:6px;color:var(--text-secondary)}
.cell .n{font-family:var(--font-mono);font-size:10px}</style></head>
<body>
<div class="grid">
  <div class="cell"><div class="chip" style="background:var(--red-60)"><span class="n">da1e28</span></div><div class="lab">Error</div></div>
  <div class="cell"><div class="chip" style="background:var(--green-60)"><span class="n">24a148</span></div><div class="lab">Success</div></div>
  <div class="cell"><div class="chip" style="background:var(--yellow-30);color:#161616"><span class="n">f1c21b</span></div><div class="lab">Warning</div></div>
  <div class="cell"><div class="chip" style="background:var(--blue-60)"><span class="n">0f62fe</span></div><div class="lab">Info</div></div>
  <div class="cell"><div class="chip" style="background:var(--purple-60)"><span class="n">8a3ffc</span></div><div class="lab">Purple</div></div>
  <div class="cell"><div class="chip" style="background:var(--teal-60)"><span class="n">007d79</span></div><div class="lab">Teal</div></div>
  <div class="cell"><div class="chip" style="background:var(--cyan-50)"><span class="n">1192e8</span></div><div class="lab">Cyan</div></div>
  <div class="cell"><div class="chip" style="background:var(--magenta-60)"><span class="n">d02670</span></div><div class="lab">Magenta</div></div>
</div>
</body></html>
