<!-- @dsCard group="Colors" viewport="700x140" name="Semantic tokens" subtitle="Surfaces, borders & text — reference these, not raw hues" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:20px;background:var(--gray-10);font-family:var(--font-sans)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.row{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--border-subtle);padding:8px 10px}
.box{width:28px;height:28px;flex:0 0 auto;border:1px solid rgba(0,0,0,.1)}
.k{font-family:var(--font-mono);font-size:11px;color:var(--text-primary)}
.v{font-family:var(--font-mono);font-size:10px;color:var(--text-helper);margin-left:auto}</style></head>
<body>
<div class="grid">
  <div class="row"><span class="box" style="background:var(--background)"></span><span class="k">--background</span><span class="v">#fff</span></div>
  <div class="row"><span class="box" style="background:var(--layer-01)"></span><span class="k">--layer-01</span><span class="v">gray-10</span></div>
  <div class="row"><span class="box" style="background:var(--field)"></span><span class="k">--field</span><span class="v">gray-10</span></div>
  <div class="row"><span class="box" style="background:var(--border-subtle)"></span><span class="k">--border-subtle</span><span class="v">gray-20</span></div>
  <div class="row"><span class="box" style="background:var(--text-primary)"></span><span class="k">--text-primary</span><span class="v">gray-100</span></div>
  <div class="row"><span class="box" style="background:var(--text-secondary)"></span><span class="k">--text-secondary</span><span class="v">gray-70</span></div>
  <div class="row"><span class="box" style="background:var(--interactive)"></span><span class="k">--interactive</span><span class="v">blue-60</span></div>
  <div class="row"><span class="box" style="background:var(--background-inverse)"></span><span class="k">--background-inverse</span><span class="v">gray-80</span></div>
</div>
</body></html>
