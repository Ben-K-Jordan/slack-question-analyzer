<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>body{margin:0;padding:24px;background:#fff}
.spec{display:flex;align-items:baseline;gap:16px;margin-bottom:14px}
.spec:last-child{margin-bottom:0}
.meta{font-family:var(--font-mono);font-size:10px;color:var(--text-helper);width:96px;flex:0 0 96px}</style></head>
<body>
<div class="spec"><span class="meta">42 / 300</span><span style="font-family:var(--font-sans);font-weight:300;font-size:42px;letter-spacing:-.02em;line-height:1">Most-asked questions</span></div>
<div class="spec"><span class="meta">32 / 300</span><span style="font-family:var(--font-sans);font-weight:300;font-size:32px;letter-spacing:-.02em;line-height:1">Analysis results</span></div>
<div class="spec"><span class="meta">20 / 400</span><span style="font-family:var(--font-sans);font-weight:400;font-size:20px;line-height:1">Question groups, ranked</span></div>
<div class="spec"><span class="meta">16 / 600</span><span style="font-family:var(--font-sans);font-weight:600;font-size:16px;line-height:1">Section heading</span></div>
</body></html>
